<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Add Project</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 40px; }
        .form-container { max-width: 600px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 0 auto; }
        h2 { color: #0f172a; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; color: #334155; }
        input, select, textarea { padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; }
        textarea { height: 120px; font-family: monospace; }
        button { background: #10b981; color: white; padding: 12px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #059669; }
        .nav-link { display: inline-block; margin-top: 15px; color: #3b82f6; text-decoration: none; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>➕ Add New Python Project</h2>
        
        <form id="projectForm">
            <div class="form-group">
                <label>Project Title</label>
                <input type="text" id="title" placeholder="e.g., Build a Discord Bot" required>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="category">
                    <option value="Basic Scripts">Basic Scripts</option>
                    <option value="Web Scraping">Web Scraping</option>
                    <option value="Automation">Automation</option>
                    <option value="Data Science">Data Science</option>
                </select>
            </div>

            <div class="form-group">
                <label>Difficulty Level</label>
                <select id="difficulty">
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>
            </div>

            <div class="form-group">
                <label>Project Summary / Explanation</label>
                <textarea id="summary" placeholder="Write the step-by-step tutorial content here..." required></textarea>
            </div>

            <div class="form-group">
                <label>Python Source Code</label>
                <textarea id="python_code" placeholder="paste python code here..." required></textarea>
            </div>

            <button type="submit">Publish Project</button>
        </form>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #cbd5e1;">
        <h3>🗑️ Manage Existing Projects</h3>
        <ul id="admin-project-list" style="list-style: none; padding: 0;">
            </ul>

        <a href="/" class="nav-link">⬅ View Main Website</a>
    </div>

    <script>
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                difficulty: document.getElementById('difficulty').value,
                summary: document.getElementById('summary').value,
                python_code: document.getElementById('python_code').value
            };

            const response = await fetch('/api/projects', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert('🚀 Project published successfully to your database!');
                loadAdminList(); // Refreshes management list right after adding
                document.getElementById('projectForm').reset();
            } else {
                alert('❌ Error publishing project.');
            }
        });

        // Load and display projects on the admin panel with delete buttons
        async function loadAdminList() {
            try {
                const response = await fetch('/api/projects');
                const projects = await response.json();
                const listContainer = document.getElementById('admin-project-list');
                listContainer.innerHTML = ''; 
                
                projects.forEach(proj => {
                    listContainer.innerHTML += `
                        <li style="display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f8fafc; border: 1px solid #e2e8f0; margin-bottom: 8px; border-radius: 4px;">
                            <span style="color: #334155;">🔹 <strong>${proj.title}</strong> (${proj.category})</span>
                            <button onclick="deleteProject(${proj.id})" style="background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;">Delete</button>
                        </li>
                    `;
                });
            } catch (err) {
                console.error("Error loading admin menu list:", err);
            }
        }

        // Send a delete request to the backend server
        async function deleteProject(id) {
            if (confirm('Are you absolutely sure you want to delete this project?')) {
                const response = await fetch(`/api/projects/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    alert('🗑️ Project removed completely!');
                    loadAdminList(); 
                } else {
                    alert('❌ Error deleting project.');
                }
            }
        }

        // Run this automatically when the page loads
        loadAdminList();
    </script>
</body>
</html>
